yhs_can_control_node:
  ros__parameters:
    can_name: "can0"
    odom_frame: "odom"
    base_link_frame: "base_link"
    tf_used: false
    wheel_base: 1.05  #07=0.65  09=0.85
    ultrasonic_number: [0,1, 2, 3, 4, 5, 6, 7] # 如果有超声波，安装的位置可能不同，打印“ultrasonic”话题，根据实际数据改变序号，空格隔开，
                                               # 前右到右前默认[0~7]，逆时针，单位为毫米 
    io_cmd:
      enable: false
      lower_beam: false
      upper_beam: false
      turn_lamp: 0
      braking_lamp: false
      clearance_lamp: true
      fog_lamp: false
      speaker: false
      discharge: false
